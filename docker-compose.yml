services:
  api:
    build:
      context: .
      dockerfile: CityCare.Api/Dockerfile
    restart: unless-stopped
    ports:
      - "5158:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=citycare;Username=citycare;Password=citycare
      - Keycloak__Url=http://keycloak:8080
      - Keycloak__Realm=CityCare
      - Keycloak__ClientId=citycare-web
      - Keycloak__ApiClientId=citycare-api
      - Keycloak__ApiClientSecret=lmjLE3Ye6iXjilfAwZwlHxt4ngI1pXEE
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: unless-stopped
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=keycloak
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - internal

  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=keycloak
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=citycare
      - POSTGRES_USER=citycare
      - POSTGRES_PASSWORD=citycare
    ports:
      - "5432:5432"
    volumes:
      - app_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U citycare -d citycare"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  keycloak_pg_data:
  app_pg_data:
