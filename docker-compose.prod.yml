# ─────────────────────────────────────────────────────────────
# Docker Compose — PRODUCTION (autonome)
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# Différences avec le compose local :
#   - API en mode Production (Swagger off, erreurs masquées)
#   - MinIO exposé via une URL PUBLIQUE (plus de localhost)
#   - Secrets (DB, Keycloak, MinIO) fournis par un fichier .env sur le serveur
#
# Variables à définir dans un fichier `.env` à côté de ce fichier :
#   POSTGRES_PASSWORD          mot de passe de la base applicative
#   KEYCLOAK_ADMIN             admin console Keycloak
#   KEYCLOAK_ADMIN_PASSWORD    mot de passe admin Keycloak
#   KEYCLOAK_API_CLIENT_SECRET secret du client citycare-api
#   MINIO_ROOT_USER            identifiant MinIO
#   MINIO_ROOT_PASSWORD        mot de passe MinIO
#   MINIO_PUBLIC_BASE_URL      URL publique MinIO, ex. https://storage.citycare.fr  (OBLIGATOIRE)
# ─────────────────────────────────────────────────────────────

services:
  api:
    build:
      context: .
      dockerfile: CityCare.Api/Dockerfile
    restart: always
    ports:
      - "5158:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=${POSTGRES_DB:-citycare};Username=${POSTGRES_USER:-citycare};Password=${POSTGRES_PASSWORD}
      - Keycloak__Url=http://keycloak:8080
      - Keycloak__Realm=CityCare
      - Keycloak__ClientId=citycare-web
      - Keycloak__ApiClientId=citycare-api
      - Keycloak__ApiClientSecret=${KEYCLOAK_API_CLIENT_SECRET}
      - Minio__Endpoint=minio:9000
      - Minio__AccessKey=${MINIO_ROOT_USER}
      - Minio__SecretKey=${MINIO_ROOT_PASSWORD}
      - Minio__Bucket=${MINIO_BUCKET:-citycare-photos}
      - Minio__UseSSL=${MINIO_USE_SSL:-true}
      # URL publique vue par le navigateur (plus de localhost en prod)
      - Minio__PublicBaseUrl=${MINIO_PUBLIC_BASE_URL}
      - Minio__MaxFileSizeMb=5
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started
      minio:
        condition: service_healthy
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    restart: always
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - ./keycloak/realm:/opt/keycloak/data/import
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - internal

  keycloak-db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=keycloak
      - POSTGRES_USER=keycloak
      - POSTGRES_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-citycare}
      - POSTGRES_USER=${POSTGRES_USER:-citycare}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - app_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-citycare} -d ${POSTGRES_DB:-citycare}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  keycloak_pg_data:
  app_pg_data:
  minio_data:
